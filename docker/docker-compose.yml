# Fluss vs Kafka benchmark stack.
#
# Versions pinned from verified research (see bench/FINDINGS.md):
#   Fluss  0.9.1-incubating   (latest, 2026-05-04; still Apache incubating)
#   Flink  2.2.1              (delta join requires Flink >= 2.1.2 / 2.2)
#   Kafka  KRaft mode         (no ZooKeeper — contrast with Fluss, which still needs ZK)
#
# Honest note for the post: Fluss 0.9.1 still depends on ZooKeeper for coordination,
# and requires remote storage (S3/MinIO here) for log tiering. Kafka here runs ZK-free
# in KRaft mode. That asymmetry is itself a finding.

name: fluss-kafka-bench

x-flink-common: &flink-common
  image: flink:2.2.1-scala_2.12-java17
  volumes:
    - ./flink-conf/config.yaml:/opt/flink/conf/config.yaml   # Flink 2.2 uses config.yaml, NOT flink-conf.yaml
    - ../flink-jobs/target:/opt/flink/usrlib       # built benchmark jar lands here
    - ./flink-lib/fluss-flink-2.2-0.9.1-incubating.jar:/opt/flink/lib/fluss-flink-2.2-0.9.1-incubating.jar  # Fluss connector on the SQL classpath
    - ./flink-lib/flink-sql-connector-kafka-5.0.0-2.2.jar:/opt/flink/lib/flink-sql-connector-kafka-5.0.0-2.2.jar  # Kafka connector for interop SQL
    - ./flink-lib/fluss-lake-iceberg-0.9.1-incubating.jar:/opt/flink/lib/fluss-lake-iceberg-0.9.1-incubating.jar  # Iceberg lake connector (read tiered data + tiering job)
    # Iceberg hadoop catalog needs Hadoop classes on the Flink classpath too (tiering job + reads).
    - ./hadoop-libs/hadoop-client-api-3.3.6.jar:/opt/flink/lib/hadoop-client-api-3.3.6.jar
    - ./hadoop-libs/hadoop-client-runtime-3.3.6.jar:/opt/flink/lib/hadoop-client-runtime-3.3.6.jar
    - ./hadoop-libs/commons-logging-1.2.jar:/opt/flink/lib/commons-logging-1.2.jar
    - ../sql:/opt/sql                              # Flink SQL scripts
    - flink-checkpoints:/tmp/flink-checkpoints
    - iceberg-wh:/tmp/iceberg                      # shared Iceberg warehouse (read tiered data)
  environment:
    - |
      FLINK_PROPERTIES=
      jobmanager.rpc.address: jobmanager

services:
  # ----------------------------------------------------------------------------
  # Coordination + storage for Fluss
  # ----------------------------------------------------------------------------
  zookeeper:
    image: zookeeper:3.9
    hostname: zookeeper
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,srvr,stat"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MinIO provides the S3-compatible remote tier Fluss requires.
  minio:
    image: minio/minio:latest
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9101:9001"     # MinIO console (host 9101 to avoid clashing with other local stacks)
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the bucket Fluss tiers into, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/fluss &&
      echo 'bucket fluss ready';
      "

  # ----------------------------------------------------------------------------
  # Fluss cluster: 1 coordinator + 1 tablet server
  # ----------------------------------------------------------------------------
  coordinator-server:
    image: apache/fluss:0.9.1-incubating
    command: coordinatorServer
    depends_on:
      zookeeper:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://coordinator-server:9123
        remote.data.dir: s3://fluss/remote-data
        s3.endpoint: http://minio:9000
        s3.region: us-east-1
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path-style-access: true
        datalake.format: iceberg
        datalake.iceberg.type: hadoop
        datalake.iceberg.warehouse: /tmp/iceberg
    volumes:
      - iceberg-wh:/tmp/iceberg          # shared Iceberg warehouse (hadoop catalog)
      # Iceberg's hadoop catalog needs Hadoop classes (not in the Fluss image).
      - ./hadoop-libs/hadoop-client-api-3.3.6.jar:/opt/fluss/plugins/iceberg/hadoop-client-api-3.3.6.jar
      - ./hadoop-libs/hadoop-client-runtime-3.3.6.jar:/opt/fluss/plugins/iceberg/hadoop-client-runtime-3.3.6.jar
      - ./hadoop-libs/commons-logging-1.2.jar:/opt/fluss/plugins/iceberg/commons-logging-1.2.jar
      - ./flink-lib/fluss-kafka-0.9.1-incubating.jar:/opt/fluss/lib/fluss-kafka-0.9.1-incubating.jar
    ports:
      - "9123:9123"

  tablet-server:
    image: apache/fluss:0.9.1-incubating
    command: tabletServer
    depends_on:
      coordinator-server:
        condition: service_started
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: FLUSS://tablet-server:9124,KAFKA://tablet-server:19092
        kafka.enabled: true
        kafka.listener.names: KAFKA
        data.dir: /tmp/fluss/data
        remote.data.dir: s3://fluss/remote-data
        kv.snapshot.interval: 0s
        s3.endpoint: http://minio:9000
        s3.region: us-east-1
        s3.access-key: minioadmin
        s3.secret-key: minioadmin
        s3.path-style-access: true
        datalake.format: iceberg
        datalake.iceberg.type: hadoop
        datalake.iceberg.warehouse: /tmp/iceberg
    volumes:
      - fluss-data:/tmp/fluss/data
      - iceberg-wh:/tmp/iceberg          # shared Iceberg warehouse (hadoop catalog)
      - ./hadoop-libs/hadoop-client-api-3.3.6.jar:/opt/fluss/plugins/iceberg/hadoop-client-api-3.3.6.jar
      - ./hadoop-libs/hadoop-client-runtime-3.3.6.jar:/opt/fluss/plugins/iceberg/hadoop-client-runtime-3.3.6.jar
      - ./hadoop-libs/commons-logging-1.2.jar:/opt/fluss/plugins/iceberg/commons-logging-1.2.jar
      - ./flink-lib/fluss-kafka-0.9.1-incubating.jar:/opt/fluss/lib/fluss-kafka-0.9.1-incubating.jar
      - ./flink-lib/kafka-clients-3.9.0.jar:/opt/fluss/lib/kafka-clients-3.9.0.jar
    ports:
      - "19092:19092"   # Fluss Kafka-protocol listener on the TabletServer (S5)

  # ----------------------------------------------------------------------------
  # Kafka in KRaft mode (no ZooKeeper)
  # ----------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 4
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 5s
      timeout: 10s
      retries: 12

  # ----------------------------------------------------------------------------
  # Flink 2.2 cluster
  # ----------------------------------------------------------------------------
  # The checkpoints volume is root-owned on creation; Flink runs as uid 9999.
  # This one-shot init makes it writable so checkpointing (and the whole
  # delta-join-vs-stream-join measurement) works out of the box.
  flink-init:
    image: flink:2.2.1-scala_2.12-java17
    user: root
    command: bash -c "mkdir -p /tmp/flink-checkpoints /tmp/flink-savepoints /tmp/iceberg && chmod -R 777 /tmp/iceberg && chown -R 9999:9999 /tmp/flink-checkpoints /tmp/flink-savepoints && echo 'dirs ready'"
    volumes:
      - flink-checkpoints:/tmp/flink-checkpoints
      - iceberg-wh:/tmp/iceberg

  jobmanager:
    <<: *flink-common
    hostname: jobmanager
    command: jobmanager
    ports:
      - "8082:8081"     # Flink Web UI (host 8082 to avoid clashing with other local stacks)
      - "9249:9249"     # Prometheus reporter (jobmanager)
    depends_on:
      coordinator-server:
        condition: service_started
      flink-init:
        condition: service_completed_successfully

  taskmanager:
    <<: *flink-common
    command: taskmanager
    scale: 1
    expose:
      - "9249"          # Prometheus reporter (taskmanager)
    depends_on:
      jobmanager:
        condition: service_started

  # ----------------------------------------------------------------------------
  # Observability
  # ----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  fluss-data:
  flink-checkpoints:
  iceberg-wh:
